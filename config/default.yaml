vision:
  default_model: uni2
  smoke_limit: 8
  models:
    uni2:
      hub: MahmoodLab/UNI2-h
      embed_dim: 1536
      architecture: ViT-H
      gated: true
      access_url: https://huggingface.co/MahmoodLab/UNI2-h
    conch:
      hub: MahmoodLab/CONCH
      embed_dim: 512
      architecture: vision-language
      gated: true
      access_url: https://huggingface.co/MahmoodLab/CONCH
    virchow2:
      hub: paige-ai/Virchow2
      embed_dim: 1280
      architecture: ViT-H
      gated: true
      access_url: https://huggingface.co/paige-ai/Virchow2
    ctranspath:
      hub: xiyuez/ctranspath
      embed_dim: 768
      architecture: Swin Transformer
      gated: false
      access_url: https://huggingface.co/xiyuez/ctranspath
  datasets:
    primary:
      name: tcga_brca
      manifest_path: data/raw/vision/tcga_brca_manifest.jsonl
      processed_manifest_path: data/processed/vision/feature_manifest.jsonl
    benchmark:
      name: breakhis
      manifest_path: data/raw/vision/breakhis_manifest.jsonl
  extraction:
    output_dir: outputs/vision/features
    batch_size: 4
    num_workers: 2
    pooling: mean
    file_format: pt
    fallback_model: ctranspath
  explainability:
    mode: provenance_only
    include_attention_summary: true
  training:
    centroid_metric: cosine
    top_k: 3
